<!DOCTYPE html>
<html>
<head>

</head>
<body>

    <svg viewBox="0 0 1440 400" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%;" preserveAspectRatio="none">
      <!-- Distant Hills -->
      <path d="M0 160 Q 360 80 720 180 T 1440 140 L 1440 400 L 0 400 Z" fill="#A4B626" />
      
      <!-- Midground Hills -->
      <path d="M0 200 Q 400 120 800 200 T 1440 160 L 1440 400 L 0 400 Z" fill="#8E9E26" />
      
      <!-- Foreground Grass -->
      <path d="M0 240 Q 250 160 500 220 T 1440 180 L 1440 400 L 0 400 Z" fill="#6D8520" />

      <!-- Compact Soil Layer (Shifted down by 25px) -->

      <!-- Roots/Worm paths for realism -->
      <path d="M 200 350 C 200 310, 250 310, 250 350 S 300 390, 300 350" fill="none" stroke="#693D22" strokeWidth="18" strokeLinecap="round" />
      <path d="M 1100 320 C 1100 270, 1180 270, 1180 320 S 1260 370, 1260 320" fill="none" stroke="#693D22" strokeWidth="24" strokeLinecap="round" />

  </div>
